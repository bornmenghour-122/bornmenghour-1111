<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(90, 194, 218);
            width: 500px;
            height: 600px;
            margin: auto;
        }
        div{
            margin: 80px auto;
            width: 500px;
            background: rgb(104, 115, 231);
            text-align: center;
            border-radius: 10px;
        }
        input{
            margin: 5px auto;
            width: 100px;
            height: 15px;
            background: rgb(180, 188, 230);
            border-radius: 10px;

        }
        button{
            display: inline-block;
            padding: 12px 24px;
            background-color: rgb(103, 41, 197);
            color: white;
            text-decoration: none; 
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover{
            background-color: rgb(222, 80, 211); 
        }
        a {
            position: absolute;
            top: 20px;    
            left: 20px;   
        }
        .bad {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgb(103, 41, 197);
            color: white;
            text-decoration: none; 
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
        .bad:hover {
            background-color: rgb(222, 80, 211); 
        }
        
    </style>
    
</head>
<body>
    <a class="bad" href="/chapter_9/index.html" style="text-align: left">Back</a>
    <div style="text-align: center;">
    <h1>Staff Cambodia Taxation</h1>
    <input type="text" id="a" placeholder="Name"><br><br>
    <input type="number" id="b" placeholder="Salary">
    <h1 id="a1"></h1>
    <h1 id="a2"></h1>
    <h1 id="tax"></h1>
    <h1 id="netsalary"></h1>
    <button onclick="May()">Enter</button>
</div>
    <script>
        function May(){
            let a=document.getElementById("a").value;
            let b=parseFloat(document.getElementById("b").value);
            document.getElementById("a1").innerHTML="Name: "+a
            document.getElementById("a2").innerHTML="Salary: "+b+" R"
            let tax=0;
            if(b<=1500000) tax=0;
            else if (b<=2000000) tax=(b*0.05)-75000;
            else if (b<=8500000) tax=(b*0.10)-175000;
            else if (b<=12500000) tax=(b*0.15)-600000;
            else tax=(b*0.20)-1225000;
            netsalary=b-tax;
            document.getElementById("tax").innerHTML="Tax: " +tax+" R"
            document.getElementById("netsalary").innerHTML="Netsalary: " +netsalary+" R"


        }

    </script>
</body>
</html>
