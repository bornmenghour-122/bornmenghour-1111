<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 80px auto;
            width: 500px;
            background: rgb(104, 115, 231);
            
            border-radius: 10px;
        }
        input{
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        input{
            margin: 5px auto;
            width: 100px;
            height: 15px;
            background: rgb(180, 188, 230);
            border-radius: 10px;

        }
        div{
            margin: 80px auto;
            width: 500px;
            background: rgb(85, 204, 225);
            text-align: center;
            border-radius: 10px;
        }
        button{
            padding: 10px;
            border: blueviolet;
            border-radius: 10px;
            background: rgb(88, 216, 238);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .bad {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgb(103, 41, 197);
            color: white;
            text-decoration: none; 
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
        .bad:hover {
            background-color: rgb(222, 80, 211); 
        }
        a {
            position: absolute;
            top: 20px;    
            left: 20px;   
        }
    </style>
</head>
<body>
    <a class="bad" href="/chapter_9/index.html" style="text-align: left">Back</a>
    <div style="text-align: center;">
    <input type="Number" id="a" placeholder="(Number 1-7)">
    <h1 id="a1"></h1>
    <button onclick="sum()">Click</button>
</div>
    <script>
        function sum(){
            let a=parseInt(document.getElementById("a").value);
            switch(a){
                case 1 : document.getElementById("a1").innerHTML="Monday";break;
                case 2 : document.getElementById("a1").innerHTML="Tuesday";break;
                case 3 : document.getElementById("a1").innerHTML="Wednesday";break;
                case 4 : document.getElementById("a1").innerHTML="Thurday";break;
                case 5 : document.getElementById("a1").innerHTML="Friday";break;
                case 6 : document.getElementById("a1").innerHTML="Saturday";break;
                case 7 : document.getElementById("a1").innerHTML="Sunday";break;
                default:document.getElementById("a1").innerHTML="Unknow ";
            }
        }
    </script>

    
</body>
</html>
